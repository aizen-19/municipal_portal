<div class="auth-panel-content">
  <h2 class="auth-title">Create Citizen Account</h2>
  <p class="auth-subtitle">Join the portal to access municipal services.</p>
  
  <div class="auth-error-alert" *ngIf="errorMessage" style="color: #ef4444; background: #fef2f2; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.875rem; border: 1px solid #fee2e2;">
    <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMessage }}
  </div>

  <div class="auth-success-alert" *ngIf="successMessage" style="color: #16a34a; background: #f0fdf4; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.875rem; border: 1px solid #dcfce7;">
    <i class="bi bi-check-circle-fill"></i> {{ successMessage }}
  </div>

  <form class="auth-form" (submit)="onSignUpSubmit($event)">
    <div class="auth-group">
      <label>Full Name</label>
      <input type="text" name="fullName" [(ngModel)]="fullName" placeholder="enter your full name" required />
    </div>
    <div class="auth-group">
      <label>Email Address</label>
      <input type="email" name="email" [(ngModel)]="email" placeholder="enter your email" required />
    </div>
    <div class="auth-group">
      <label>Password</label>
      <input type="password" name="password" [(ngModel)]="password" placeholder="create password" required />
    </div>
    <div class="auth-group">
      <label>Confirm Password</label>
      <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="confirm password" required />
    </div>
    <button type="submit" class="btn-auth-action">Register Account</button>
  </form>

  <div class="auth-footer">
    <p>Already have an account? <a (click)="switchToLogin.emit()" class="switch-auth-link">Sign in here</a></p>
  </div>
</div>
