<header class="navbar-header">
  <div class="brand-logo" (click)="setActiveSection('home')">
    <img src="assets/img3.jpeg" alt="Municipal Logo" class="logo-img" />
    <div class="brand-text">
      <strong>Municipal Civic Portal</strong>
      <small>GOVERNMENT OF INDIA</small>
    </div>
  </div>

  <nav class="nav-links">
    <a [routerLink]="['/']" 
       fragment="home"
       (click)="setActiveSection('home')"
       [class.active]="!currentFragment || currentFragment === 'home'" 
       class="nav-item">Home</a>

    <a [routerLink]="['/']" 
       fragment="services" 
       (click)="setActiveSection('services')"
       [class.active]="currentFragment === 'services'" 
       class="nav-item">Services</a>

    <a [routerLink]="['/']" 
       fragment="procedure" 
       (click)="setActiveSection('procedure')"
       [class.active]="currentFragment === 'procedure'" 
       class="nav-item">Procedure</a>

    <a [routerLink]="['/']" 
       fragment="aboutus" 
       (click)="setActiveSection('aboutus')"
       [class.active]="currentFragment === 'aboutus'" 
       class="nav-item">About Us</a>

    <a [routerLink]="['/']" 
       fragment="contactus" 
       (click)="setActiveSection('contactus')"
       [class.active]="currentFragment === 'contactus'" 
       class="nav-item">Contact Us</a>
  </nav>

  <div class="nav-auth-actions">
    <button class="btn-login" *ngIf="!isUserLoggedIn()" (click)="openModal('login')">Login</button>
    <button class="btn-signup" *ngIf="!isUserLoggedIn()" (click)="openModal('signup')">Sign Up</button>
    
    <a routerLink="/dashboard" class="btn-dashboard-go" *ngIf="isUserLoggedIn()" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 8px 18px; border-radius: 8px; font-weight: 600; font-size: 0.875rem; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.25);">
      <i class="bi bi-layout-text-window-reverse" style="margin-right: 8px;"></i> Dashboard
    </a>
  </div>
</header>

<div class="modal-overlay" *ngIf="activeAuthModal" (click)="closeModal()">
  <div class="auth-modal-card" (click)="$event.stopPropagation()">
    <button class="close-modal-btn" (click)="closeModal()">×</button>

    <app-login 
      *ngIf="activeAuthModal === 'login'"
      (close)="closeModal()"
      (switchToSignUp)="openModal('signup')">
    </app-login>

    <app-signup 
      *ngIf="activeAuthModal === 'signup'"
      (close)="closeModal()"
      (switchToLogin)="openModal('login')">
    </app-signup>

  </div>
</div>
