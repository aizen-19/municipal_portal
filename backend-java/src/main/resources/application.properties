# Server Port Configuration
server.port=5000

# =========================================================================
# 1. DEFAULT BEGINNER-FRIENDLY H2 DATABASE CONFIGURATION
#    This configures a local, file-based relational database that stores
#    data in the './data' directory (persisting between restarts).
# =========================================================================
spring.datasource.url=jdbc:h2:file:./data/municipal_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Web Console for Visual Inspection (Path: http://localhost:5000/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# =========================================================================
# 2. AWS RDS POSTGRESQL DATABASE CONFIGURATION (UNCOMMENT TO USE)
#    Uncomment these lines and supply your AWS RDS PostgreSQL connection details.
# =========================================================================
# spring.datasource.url=jdbc:postgresql://database-instance.c123456789.us-east-1.rds.amazonaws.com:5432/municipal_portal
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=your_rds_master_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================================================================
# 3. JPA / HIBERNATE SCHEMA AUTOMATION
#    Hibernate will automatically scan entity classes and generate tables 
#    and columns on database startup.
# =========================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
